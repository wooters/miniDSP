name: Deploy Documentation

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Doxygen 1.16.1
        run: |
          curl -fsSL https://github.com/doxygen/doxygen/releases/download/Release_1_16_1/doxygen-1.16.1.linux.bin.tar.gz -o doxygen.tar.gz
          tar xzf doxygen.tar.gz
          sudo install -m 755 doxygen-1.16.1/bin/doxygen /usr/local/bin/doxygen
          rm -rf doxygen.tar.gz doxygen-1.16.1

      - name: Install build dependencies
        run: sudo apt-get update && sudo apt-get install -y gcc-14 libc6-dev make libfftw3-dev libsndfile1-dev portaudio19-dev

      - name: Generate documentation
        run: make docs CC=gcc-14

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
